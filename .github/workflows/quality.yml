name: CI — Quality & Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check backend/ engine/ models/ parsers/ cli/

      - name: Ruff format check
        run: ruff format --check backend/ engine/ models/ parsers/ cli/

      - name: Run quality pipeline
        run: python pipeline/code_review.py
        continue-on-error: true  # warnings only — doesn't block merge

      - name: Run unit tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          DATABASE_URL_SYNC: sqlite:///./test.db
          DATABASE_SSL: "false"
          SECRET_KEY: test-secret-key-32-bytes-long-here
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          GOOGLE_REDIRECT_URI: http://localhost:8000/api/auth/google/callback
          FRONTEND_URL: http://localhost:3000
          DEBUG: "false"
        run: pytest tests/ -v --ignore=tests/locustfile.py --tb=short

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000

  load-test-smoke:
    name: Load test smoke (5 users, 15s)
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Start backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./smoke.db
          DATABASE_URL_SYNC: sqlite:///./smoke.db
          DATABASE_SSL: "false"
          SECRET_KEY: smoke-secret-key-32-bytes-long-xx
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          GOOGLE_REDIRECT_URI: http://localhost:8000/api/auth/google/callback
          FRONTEND_URL: http://localhost:3000
          DEBUG: "false"
        run: |
          python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/api/health || exit 1

      - name: Locust smoke test (5 users, no auth endpoints only)
        run: |
          locust -f tests/locustfile.py \
            --headless -u 5 -r 1 -t 15s \
            --host http://localhost:8000 \
            --only-summary \
            --exit-code-on-error 1
