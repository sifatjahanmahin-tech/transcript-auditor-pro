services:
  - type: web
    name: transcript-auditor-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./audit_pro.db
      - key: DATABASE_URL_SYNC
        value: sqlite:///./audit_pro.db
      - key: DATABASE_SSL
        value: "false"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: FRONTEND_URL
        value: https://transcript-auditor-pro.vercel.app
      - key: GOOGLE_REDIRECT_URI
        value: https://transcript-auditor-api.onrender.com/api/auth/google/callback
      - key: MOBILE_REDIRECT_URI
        value: https://transcript-auditor-api.onrender.com/api/auth/google/callback
      - key: CORS_ORIGINS
        value: '["https://transcript-auditor-pro.vercel.app","http://localhost:3000","http://localhost:8081","exp://localhost:8081"]'
      - key: WORKER_COUNT
        value: "1"
      # ── Set these manually in the Render dashboard (Secrets) ──
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
